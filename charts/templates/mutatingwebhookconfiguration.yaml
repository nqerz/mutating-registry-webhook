apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-registry-webhook
  labels:
    app: mutating-registry-webhook
webhooks:
  - name: image.mutating.webhook.k8s.io
    admissionReviewVersions: ["v1", "v1beta1"]
    sideEffects: None
    timeoutSeconds: 5
    failurePolicy: Ignore
    clientConfig:
      service:
        name: mutating-registry-webhook
        namespace: {{ .Release.Namespace }}
        path: /mutate
        port: {{ .Values.service.port }}
      caBundle: {{ if (lookup "v1" "Secret" .Release.Namespace "mutating-registry-webhook-tls") }}{{ index (lookup "v1" "Secret" .Release.Namespace "mutating-registry-webhook-tls").data "tls.crt" }}{{ else }}""{{ end }}
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values: ["kube-system"]
