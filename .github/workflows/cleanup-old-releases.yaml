name: Cleanup Old Releases and Docker Images

on:
  workflow_call:
    inputs:
      retention_days:
        description: 'Number of days to retain releases and images before deletion'
        required: false
        type: number
        default: 7
      repository:
        description: 'Repository in format owner/repo'
        required: false
        type: string
    secrets:
      docker_username:
        description: 'Docker Hub username'
        required: true
      docker_password:
        description: 'Docker Hub password or access token'
        required: true

jobs:
  cleanup-old-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_password }}

      - name: Delete old releases and Docker images
        uses: actions/github-script@v7
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const now = new Date();
            const retentionDays = ${{ inputs.retention_days }};
            const cutoffDate = new Date(now.getTime() - retentionDays * 24 * 60 * 60 * 1000);
            const versionPattern = /^v\d+\.\d+\.\d+\-pre\d+-\d+$/;
            const [owner, repo] = '${{ inputs.repository }}'.split('/').length === 2
              ? '${{ inputs.repository }}'.split('/')
              : [context.repo.owner, context.repo.repo];

            // Delete old GitHub releases
            for (const release of releases) {
              if (!versionPattern.test(release.tag_name)) continue;
              const releaseDate = new Date(release.created_at);
              if (releaseDate < cutoffDate) {
                console.log(`Deleting GitHub release ${release.tag_name}`);
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id
                });
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`
                });
              }
            }

            // Delete old Docker images
            const { execSync } = require('child_process');
            const dockerRepo = 'nqerz/registry-mutation-webhook';

            try {
              // Get list of tags from Docker Hub
              const tagsCmd = `curl -s "https://hub.docker.com/v2/repositories/${dockerRepo}/tags?page_size=100"`;
              const response = execSync(tagsCmd).toString();
              const tagsResult = JSON.parse(response);

              if (!tagsResult || !tagsResult.results || !Array.isArray(tagsResult.results)) {
                throw new Error('Invalid response format from Docker Hub API');
              }

              for (const tag of tagsResult.results) {
                if (!tag || !tag.name || !tag.last_updated) continue;
                if (!versionPattern.test(tag.name)) continue;

                const tagDate = new Date(tag.last_updated);
                if (tagDate < cutoffDate) {
                  console.log(`Deleting Docker image tag ${tag.name}`);
                  const deleteCmd = `curl -s -X DELETE -H "Authorization: JWT ${{ secrets.docker_password }}" https://hub.docker.com/v2/repositories/${dockerRepo}/tags/${tag.name}/`;
                  execSync(deleteCmd);
                }
              }
            } catch (error) {
              console.error('Error cleaning up Docker images:', error.message);
              if (error.stdout) console.error('API Response:', error.stdout.toString());
              if (error.stderr) console.error('Error Output:', error.stderr.toString());
            }