name: Test Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-build:
    uses: ./.github/workflows/build.yaml
    with:
      version: ${{ startsWith(github.ref,'refs/tags/') && github.ref_name || 'v0.0.0' }}-test-${{ github.sha }}
      push_image: true
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_password: ${{ secrets.DOCKER_PASSWORD }}

  cleanup-old-releases:
    uses: ./.github/workflows/cleanup-old-releases.yaml
    with:
      retention_days: 7
      release_pattern: 'test-'
      repository: ${{ github.repository }}
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_password: ${{ secrets.DOCKER_PASSWORD }}

  package-helm:
    needs: [test-build, cleanup-old-releases]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.12.0
      - name: Set version
        run: echo "HELM_VERSION=${{ startsWith(github.ref,'refs/tags/') && github.ref_name || 'v0.0.0' }}-test-${{ github.sha }}" >> $GITHUB_ENV

      - name: Package Helm chart
        run: |
          helm package ./charts --version ${{ env.HELM_VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Test ${{ env.VERSION }}
          files: registry-mutation-webhook-*.tgz
          tag_name: test-${{ github.sha }}
          prerelease: true
          generate_release_notes: false